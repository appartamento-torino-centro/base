<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    
    <link rel="alternate" hreflang="it" href="https://appartamentotorinocentro.it/it/index.html">
    <link rel="alternate" hreflang="en" href="https://appartamentotorinocentro.it/en/index.html">
    <link rel="alternate" hreflang="x-default" href="https://appartamentotorinocentro.it/index.html">

    <script>
        (function() {
            const savedLang = localStorage.getItem('i18nextLng');
            
            const browserLang = navigator.language || navigator.userLanguage;
            const lang = (savedLang || browserLang).substring(0, 2);

            if (lang === 'it') {
                window.location.replace('/it/');
            } else {
                window.location.replace('/en/');
            }
        })();
    </script>
</head>
<body>
    <p>Se non vieni reindirizzato, seleziona la lingua: 
        <a href="/it/">Italiano</a> o <a href="/en/">English</a>.
    </p>
</body>
</html>
